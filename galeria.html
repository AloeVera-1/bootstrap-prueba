<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />
    <title>Galería</title>
  </head>
  <body style="background-color: #091413">
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-12">
          <h1
            style="
              display: flex;
              justify-content: center;
              color: rgb(255, 248, 240);
              padding-top: 1rem;
              font-family: Oswald;
              letter-spacing: 0.5rem;
            "
          >
            Galería
          </h1>
        </div>
      </div>
      <div class="row" style="background-color: #285a48">
        <div class="col-md-12">
          <nav
            class="navbar navbar-expand-md navbar-dark"
            style="align-content: center"
          >
            <a
              href="index.html"
              class="navbar-item text-light"
              target="_self"
              style="
                text-decoration: none;
                margin-top: -1rem;
                padding-top: 0.7rem;
              "
              >Inicio</a
            >
            <button
              class="navbar-toggler"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#enlaces"
              aria-controls="enlaces"
              aria-expanded="false"
              aria-label="Toggle navigation"
            >
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="enlaces">
              <ul
                class="navbar-nav"
                style="margin-top: -1rem; padding-top: 0.7rem"
              >
                <li class="nav-item">
                  <a class="nav-link" href="#" target="_self"> Galería</a>
                </li>
                <li class="nav-item">
                  <a href="contacto.html" class="nav-link" target="_self"
                    >Contacto</a
                  >
                </li>
              </ul>
            </div>
          </nav>
        </div>
      </div>
      <div class="row" style="margin-top: 1rem">
        <div class="col-md-12 text-light">
          <h1
            style="
              display: flex;
              justify-content: center;
              font-family: Oswald;
              font-size: 3rem;
            "
          >
            Imagenes de la Cafetería
          </h1>
          <h3
            style="
              display: flex;
              justify-content: center;
              font-family: Oswald;
              font-size: 1.8rem;
              margin-top: -0.9rem;
              margin-bottom: 2rem;
            "
          >
            tomadas por nuestros clientes
          </h3>
        </div>
      </div>
      <div class="row" style="background-color: #285a48">
        <div class="col-md-3 text-light">
          <img src="cafeindex.webp" alt="cafe" width="250px" />
        </div>
        <div class="col-md-3 text-light">
          <img src="cafeindex2.jpg" alt="cafe" width="250px" />
        </div>
        <div class="col-md-3 text-light">
          <img src="cafeindex3.jfif" alt="cafe" width="250px" />
        </div>
        <div class="col-md-3 text-light">
          <img src="cafeindex4.jfif" alt="cafe" width="250px" />
        </div>
      </div>

      <div class="row" style="background-color: #285a48">
        <div class="col-md-6 text-light">
          <img
            src="cafimg1.jpeg"
            alt="cafe"
            width="500px"
            style="margin-left: 1rem"
          />
        </div>
        <div class="col-md-6 text-light">
          <img src="cafimage2.webp" alt="cafe" width="500px" />
        </div>
      </div>

      <div class="row" style="background-color: #285a48">
        <div class="col-md-4 text-light">
          <img
            src="land1.webp"
            alt="cafe"
            width="333px"
            style="margin-left: 1rem"
          />
        </div>
        <div class="col-md-4 text-light">
          <img
            src="land2.webp"
            alt="cafe"
            width="333px"
            style="margin-left: 1rem"
          />
        </div>
        <div class="col-md-4 text-light">
          <img
            src="land3.jfif"
            alt="cafe"
            width="333px"
            style="margin-left: 1rem"
          />
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
